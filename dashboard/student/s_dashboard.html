<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>EAMU | Student Result Portal</title>
    <link rel="stylesheet" href="s_dashboard.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="nav">
      <div class="nav-logo">
        <img src="../../image/eamuLogo.jpg"class="logo">
      </div>
      <div class="nav-brand">
        <span class="nav-brand-name">EAMU</span>
        <span class="nav-brand-sub">Learn · Innovate · Succeed</span>
      </div>
      <div class="nav-sep"></div>
      <span class="nav-portal">
        <svg
          width="13"
          height="13"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M22 10v6M2 10l10-5 10 5-10 5z" />
          <path d="M6 12v5c3 3 9 3 12 0v-5" />
        </svg>
        Student Result Portal
      </span>
      <div class="nav-right">
        <div class="nav-avatar">KA</div>
        <span class="nav-uname">Ko Anvey</span>
        <button class="btn-logout" id="logoutBtn">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"
            />
          </svg>
          Log Out
        </button>
      </div>
    </nav>

    <main class="main" id="appRoot"></main>

    <script src="s_dashboard.js"></script>
  </body>
</html>
